services:
  db:
    restart: always
    image: postgres:14.17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: egapro
    ports:
      - "${POSTGRES_HOST_PORT:-5438}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-notifications:
    restart: always
    image: postgres:14.17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: egapro_notifications
    ports:
      - "${NOTIFICATIONS_POSTGRES_HOST_PORT:-5439}:5432"
    volumes:
      - notifpgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/egapro
      NOTIFICATIONS_DATABASE_URL: postgresql://postgres:postgres@db-notifications:5432/egapro_notifications
      SKIP_ENV_VALIDATION: 1
    depends_on:
      db:
        condition: service_healthy
      db-notifications:
        condition: service_healthy
    command: >
      sh -c "corepack enable && pnpm --filter app db:push"

  minio:
    image: minio/minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/egapro-dev-app &&
             mc anonymous set none local/egapro-dev-app"

  maildev:
    image: maildev/maildev:2.2.1
    ports:
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
      - "${MAILDEV_WEB_PORT:-1080}:1080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1080"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamavd:
    image: clamav/clamav-debian:1.5.2
    ports:
      - "${CLAMAV_HOST_PORT:-3310}:3310"
    volumes:
      - clamdata:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Local Matomo stack — lets you test the full tracking plan (events, CNIL
  # exemption config, and the /admin/stats Reporting-API widgets) end-to-end
  # without touching the production instance. See scripts/matomo-local/README.md
  # ---------------------------------------------------------------------------
  matomo-db:
    image: mariadb:11.4
    profiles: ["matomo"]
    restart: always
    command: --max-allowed-packet=64MB
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: matomo
      MARIADB_ROOT_PASSWORD: matomo
    volumes:
      - matomodbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  matomo:
    image: matomo:5-apache
    profiles: ["matomo"]
    restart: always
    ports:
      - "${MATOMO_HOST_PORT:-8080}:80"
    environment:
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_DBNAME: matomo
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo
    volumes:
      - matomodata:/var/www/html
    depends_on:
      matomo-db:
        condition: service_healthy

  # One-shot provisioner. Installs Matomo (if the volume is empty), then creates
  # the "Egapro Local" site, the campaign_year / workforce_range custom
  # dimensions, an app API token, applies the CNIL privacy config and registers
  # localhost:8080 as a trusted host. Idempotent — safe to re-run on every `up`.
  matomo-init:
    image: python:3.13-slim
    profiles: ["matomo"]
    restart: "no"
    environment:
      MATOMO_URL: http://matomo
      MATOMO_SU_LOGIN: admin
      MATOMO_SU_PASSWORD: ${MATOMO_SU_PASSWORD:-changeme123}
      MATOMO_SU_EMAIL: admin@example.com
      MATOMO_SITE_NAME: Egapro Local
      MATOMO_SITE_URL: http://localhost:3000
      MATOMO_DB_HOST: matomo-db
      MATOMO_DB_NAME: matomo
      MATOMO_DB_USER: matomo
      MATOMO_DB_PASSWORD: matomo
      MATOMO_TRUSTED_HOSTS: matomo,localhost:8080,127.0.0.1:8080
    volumes:
      - ./scripts/matomo-local:/setup:ro
      - ./scripts/matomo-local/.secrets:/out
      # Same volume Matomo serves from — lets the script register localhost:8080
      # as a trusted host in config.ini.php (no API exists for that).
      - matomodata:/matomo
    depends_on:
      matomo:
        condition: service_started
    command: ["python", "/setup/cnil-setup.py"]

  # One-shot seeder. Fires synthetic events for the FULL tracking plan (page
  # views, the three funnels with abandons, and every standalone action across
  # the 9 categories) so /admin/stats shows realistic data. Idempotent — skips
  # a year already seeded. Run `python /setup/seed-events.py verify` to audit
  # the live instance for CNIL compliance.
  matomo-seed:
    image: python:3.13-slim
    profiles: ["matomo"]
    restart: "no"
    environment:
      MATOMO_URL: http://matomo
      MATOMO_SITE_ID: "1"
    volumes:
      - ./scripts/matomo-local:/setup:ro
      - ./scripts/matomo-local/.secrets:/out:ro
    depends_on:
      matomo-init:
        condition: service_completed_successfully
    command: ["python", "/setup/seed-events.py"]

volumes:
  pgdata:
  notifpgdata:
  miniodata:
  clamdata:
  valkeydata:
  matomodata:
  matomodbdata:
