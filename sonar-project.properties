sonar.projectKey=SocialGouv_egapro
sonar.organization=socialgouv
sonar.projectName=Egapro
sonar.sourceEncoding=UTF-8

# Source code location
sonar.sources=packages/app/src

# Test file patterns (excluded from source analysis)
sonar.tests=packages/app/src
sonar.test.inclusions=**/__tests__/**,**/*.test.*,**/*.spec.*

# Test coverage
sonar.javascript.lcov.reportPaths=packages/app/coverage/lcov.info

# Exclusions from source analysis (tests, generated code, infra config)
sonar.exclusions=\
  **/__tests__/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/migrations/**,\
  **/e2e/**,\
  **/test/**

# Exclusions from coverage analysis (infra/config files that cannot be unit tested)
sonar.coverage.exclusions=\
  **/instrumentation.ts,\
  **/instrumentation-client.ts,\
  **/sentry.*.config.ts,\
  **/env.js,\
  **/trpc/**,\
  **/server/db/**,\
  **/server/auth/**,\
  **/app/api/**

# Duplication exclusions (data-only files with repetitive structure)
sonar.cpd.exclusions=**/faqData.ts
