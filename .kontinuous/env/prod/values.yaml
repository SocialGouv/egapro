global:
  host: egapro.travail.gouv.fr

app:
  redirectFrom:
    - "egapro.fabrique.social.gouv.fr"
    - "index-egapro.travail.gouv.fr"
  autoscale:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  resources:
    requests:
      cpu: 500m
      memory: 1G
    limits:
      cpu: 1
      memory: 2G

apisixSuit:
  # Two APISIX pods in prod to keep the SUIT API up during rolling restarts.
  replicas: 2

valkey:
  replica:
    enabled: true
    # One replica pod per always-on app pod (= app.autoscale.minReplicas below).
    # valkey-helm deploys 1 primary + N replicas, so this gives 3 total pods,
    # matching the app HA floor. valkey has no HPA, so we pin to minReplicas
    # rather than maxReplicas to avoid over-provisioning cache storage.
    replicas: 2
    persistence:
      size: 1Gi
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
