global:
  host: egapro.travail.gouv.fr

api:
  ingress:
    enabled: false
  autoscale:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1G
    limits:
      cpu: 2
      memory: 2G
  # env:
  #   - name: EGAPRO_SENTRY_DSN
  #     valueFrom:
  #       secretKeyRef:
  #         name: sentry
  #         key: API_SENTRY_DSN
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - secretRef:
        name: "staff"
    - secretRef:
        name: "egapro-secret"
    - secretRef:
        name: smtp

app:
  env:
    # ProConnect Fédération: le client_id/secret (lus par l'app comme
    # SECURITY_MONCOMPTEPRO_*) proviennent du nouveau sealed secret `proconnect`.
    # Ce mapping `env` prend le pas sur le legacy `moncomptepro` (envFrom) pour
    # ces deux clés. Sans ça, prod enverrait l'ancien client MonComptePro à la
    # Fédération → invalid_client. Aligne prod sur preprod.
    - name: SECURITY_MONCOMPTEPRO_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: proconnect
          key: EGAPRO_PROCONNECT_CLIENT_ID
    - name: SECURITY_MONCOMPTEPRO_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: proconnect
          key: EGAPRO_PROCONNECT_CLIENT_SECRET
  vars:
    MAILER_ENABLE: "True"
    REDIS_SENTINEL_HOSTS: |
      [
        { "host": "redis-node-0.redis-headless", "port": 26379 },
        { "host": "redis-node-1.redis-headless", "port": 26379 },
        { "host": "redis-node-2.redis-headless", "port": 26379 }
      ]
    REDIS_SENTINEL_MASTER_NAME: "mymaster"
  redirectFrom:
    - "egapro.fabrique.social.gouv.fr"
    - "index-egapro.travail.gouv.fr"
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - secretRef:
        name: "moncomptepro"
    - secretRef:
        name: "staff"
    - secretRef:
        name: "egapro-secret"
    - secretRef:
        name: smtp-app
    - secretRef:
        name: redis-auth
    - configMapRef:
        name: egapro
  autoscale:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  resources:
    requests:
      cpu: 500m
      memory: 1G
    limits:
      cpu: 1
      memory: 2G

nginx:
  ingress:
    enabled: false
  autoscale:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  resources:
    requests:
      cpu: 500m
      memory: 1G
    limits:
      cpu: 1
      memory: 2G

pg:
  cnpg-cluster:
    persistence:
      size: 20Gi

redis:
  sentinel:
    enabled: true
