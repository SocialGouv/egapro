# MANUAL STEP REQUIRED BEFORE FIRST DEPLOY OF THIS BRANCH:
#
# The SUIT auth stack moved from RSA-signature-in-app to Bearer-key-in-APISIX.
# Two changes to the secret data:
#
#   1. EGAPRO_SUIT_PUBLIC_KEY_PEM is no longer used (removed below).
#   2. EGAPRO_GATEWAY_SHARED_SECRET must be added — it is the shared token
#      APISIX injects on proxied requests and the Next.js middleware verifies
#      (see packages/app/src/middleware.ts). Both the `app` and `apisix-suit`
#      pods read this key via `envFrom` of the `suit` secret.
#
# Generate & seal (run once per env against the matching kubeseal public key):
#
#   SECRET=$(openssl rand -hex 32)
#   kubectl create secret generic suit \
#     --dry-run=client \
#     --from-literal=EGAPRO_GATEWAY_SHARED_SECRET="$SECRET" \
#     -o yaml \
#   | kubeseal --scope cluster-wide --format yaml \
#     --controller-namespace sealed-secrets \
#     --merge-into .kontinuous/env/dev/templates/suit.sealed-secret.yaml
#
# EGAPRO_SUIT_API_KEY is unchanged (same Bearer that SUIT already uses — only
# the verification layer moved from the app to APISIX).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: 'true'
  name: suit
spec:
  encryptedData:
    EGAPRO_SUIT_API_KEY: 
    # EGAPRO_GATEWAY_SHARED_SECRET: <to be added by kubeseal --merge-into — see comment block above>
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: 'true'
      name: suit
    type: Opaque
