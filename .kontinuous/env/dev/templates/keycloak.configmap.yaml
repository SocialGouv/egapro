              "[{\"id\":4,\"siren\":\"444555666\",\"siret\":\"44455566600001\",\"label\":\"Administration Egapro\",\"is_collectivite_territoriale\":false,\"is_external\":false,\"is_service_public\":true}]"
            ]
          },
