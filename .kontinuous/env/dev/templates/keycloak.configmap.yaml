            ],
            "organizations": [
              "[{\"id\":1,\"siren\":\"123456789\",\"siret\":\"12345678900001\",\"label\":\"Entreprise Test A\",\"is_collectivite_territoriale\":false,\"is_external\":false,\"is_service_public\":false},{\"id\":2,\"siren\":\"987654321\",\"siret\":\"98765432100001\",\"label\":\"Entreprise Test B\",\"is_collectivite_territoriale\":false,\"is_external\":false,\"is_service_public\":true}]"
            ]
          },
          "realmRoles": [
            "user"
          ]
        },
        {
          "username": "single@test.fr",
          "email": "single@test.fr",
          "emailVerified": true,
          "enabled": true,
          "firstName": "Marie",
          "lastName": "Martin",
          "credentials": [
            {
              "type": "password",
              "value": "test",
              "temporary": false
            }
          ],
          "attributes": {
            "phoneNumber": [
              "0698765432"
            ],
            "job": [
              "DRH"
            ],
            "organizations": [
              "[{\"id\":3,\"siren\":\"111222333\",\"siret\":\"11122233300001\",\"label\":\"Entreprise Unique\",\"is_collectivite_territoriale\":false,\"is_external\":false,\"is_service_public\":false}]"
            ]
          },
          "realmRoles": [
            "user"
          ]
        },
        {
          "username": "staff@egapro.fr",
          "email": "staff@egapro.fr",
          "emailVerified": true,
          "enabled": true,
