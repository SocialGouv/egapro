# APISIX standalone — transitional gateway in front of the SUIT API (/api/v1/*).
#
# Why a gateway here: before the infra-level API Gateway arrives at Fabrique,
# we need somewhere to enforce the Bearer-key check and rate-limit on the
# three SUIT routes. Doing it in the app would mean hand-rolling a signature
# scheme again (the V1 approach we just removed). APISIX ships `key-auth` and
# `limit-req` as native plugins — zero custom code.
#
# Why APISIX in YAML standalone mode (not etcd): one pod, one ConfigMap, no
# external dependency. Trivial to rip out when the real gateway lands — see
# the "Démantèlement futur" section in docs/SUIT-API.md.
#
# Portability: the upstream target is the in-cluster `app` Service (ClusterIP).
# Nothing here depends on an ingress controller — the Ingress (separate file)
# uses host routing and works identically on ingress-nginx (alpha V2) and
# Traefik (prod V1), so this manifest stays untouched across environments.
#
# Anti-bypass: APISIX injects `X-Gateway-Forwarded: <shared-secret>` on every
# proxied request. The Next.js middleware (packages/app/src/middleware.ts)
# rejects /api/v1/* requests that don't carry the correct secret, so a pod
# with network access to `app:3000` cannot bypass the gateway.
#
# The ConfigMap lives in apisix-suit.configmap.yaml (separate file so the
# Deployment can hash it via `checksum/config` without self-include recursion).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-suit
  namespace: {{ .Values.global.namespace }}
  labels:
    app: apisix-suit
spec:
  replicas: {{ .Values.global.apisixSuit.replicas | default 1 }}
  selector:
    matchLabels:
      app: apisix-suit
  template:
    metadata:
      labels:
        app: apisix-suit
      annotations:
        # Roll pods when the ConfigMap content changes (routes, rate limits...).
        checksum/config: {{ include (print $.Template.BasePath "/apisix-suit.configmap.yaml") . | sha256sum }}
    spec:
      # APISIX upstream image ships /usr/local/apisix owned by root and writes
      # nginx.conf + logs under that tree at boot. Running as non-root (our
      # org-wide rule) therefore requires two things:
      #   1. A writable overlay on /usr/local/apisix/{conf,logs} — we use
      #      emptyDir volumes owned by fsGroup 1000.
      #   2. Seeding /conf with the image's stock files (mime.types, debug.yaml,
      #      etc.) before APISIX starts, then overlaying our ConfigMap values.
      # An initContainer running as root copies /usr/local/apisix/conf/* from
      # the image into the emptyDir; the main container then mounts the same
      # emptyDir as non-root and overwrites config.yaml + apisix.yaml via
      # subPath mounts from the ConfigMap.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: seed-conf
          image: apache/apisix:3.11.0-debian
          imagePullPolicy: IfNotPresent
          # Root in the init container is fine — it never handles traffic and
          # exits before the main container starts. We only need it long
          # enough to chown the emptyDir and copy the stock conf/ tree.
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -eu
              cp -r /usr/local/apisix/conf/. /seed-conf/
              chown -R 1000:1000 /seed-conf /seed-logs
          volumeMounts:
            - name: apisix-conf
              mountPath: /seed-conf
            - name: apisix-logs
              mountPath: /seed-logs
      containers:
        - name: apisix
          image: apache/apisix:3.11.0-debian
          imagePullPolicy: IfNotPresent
          # Secrets referenced by `$ENV://…` inside apisix.yaml. Both keys
          # come from the shared `suit` sealed-secret (see env/*/templates).
          envFrom:
            - secretRef:
                name: suit
          ports:
            - name: http
              containerPort: 9080
            - name: metrics
              containerPort: 9091
          # Probing the gateway port with an empty-URI request returns 404 from
          # APISIX's NGINX — a deterministic signal that the listener is up
          # without touching the metrics subsystem. We explicitly accept 404
          # here rather than wiring a `/healthz` route (which would widen the
          # attack surface by adding an unauthenticated route).
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Writable overlay seeded by the init container. APISIX needs to
            # generate nginx.conf here at boot.
            - name: apisix-conf
              mountPath: /usr/local/apisix/conf
            - name: apisix-logs
              mountPath: /usr/local/apisix/logs
            # ConfigMap files overlayed on top of the seeded conf dir. subPath
            # keeps the surrounding stock files (mime.types, debug.yaml…)
            # intact — a full dir mount would hide them.
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: config
              mountPath: /usr/local/apisix/conf/apisix.yaml
              subPath: apisix.yaml
              readOnly: true
      volumes:
        - name: apisix-conf
          emptyDir: {}
        - name: apisix-logs
          emptyDir: {}
        - name: config
          configMap:
            name: apisix-suit-config
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-suit
  namespace: {{ .Values.global.namespace }}
  labels:
    app: apisix-suit
spec:
  type: ClusterIP
  selector:
    app: apisix-suit
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9091
      targetPort: metrics
