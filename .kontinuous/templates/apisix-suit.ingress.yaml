# Public entrypoint for the SUIT API, routed to APISIX only (the ClusterIP
# Service exposes APISIX internally — users go through the Ingress or nothing).
#
# The host is deliberately distinct from the app Ingress: SUIT integrators
# consume `api-suit.<host>`, end users stay on `<host>`. That split keeps the
# gateway scope narrow — APISIX never sees browser traffic.
#
# Written without controller-specific annotations beyond cert-manager, so the
# same manifest works on ingress-nginx (alpha V2) and Traefik (prod V1). The
# `nginx.ingress.kubernetes.io/ssl-redirect` annotation is a no-op on Traefik
# (Traefik redirects HTTPS via its entrypoint config), harmless either way.
#
# cert-manager + letsencrypt-prod mirrors the pattern used by
# .kontinuous/env/dev/templates/maildev.yaml — same ClusterIssuer, same flow.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apisix-suit
  namespace: {{ .Values.global.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.apisixSuit.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - api-suit.{{ .Values.global.host }}
      secretName: apisix-suit-tls
  rules:
    - host: api-suit.{{ .Values.global.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apisix-suit
                port:
                  name: http
