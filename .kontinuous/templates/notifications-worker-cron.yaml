apiVersion: batch/v1
kind: CronJob
metadata:
  name: notifications-worker
  namespace: {{ .Values.global.namespace }}
spec:
  # K8s CronJob does not support sub-minute schedules. Each tick drains up to
  # NOTIFICATIONS_BATCH_SIZE rows; the loop driver inside the script picks up
  # whatever is pending and exits — failures are retried on the next tick via
  # the `next_retry_at` exponential backoff (1m / 5m / 30m / 2h / 12h).
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # A tick that fails entirely (DB unreachable, SMTP relay down) gets one
      # attempt — the next minute's tick takes over. backoffLimit > 0 here
      # would create a thundering herd if the relay stays down for hours.
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: notifications-worker
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          containers:
            - name: notifications-worker
              image: "{{ .Values.global.registry }}/{{ .Values.global.imageProject }}/{{ .Values.global.imageRepository }}/app:{{ .Values.global.imageTag }}"
              securityContext:
                allowPrivilegeEscalation: false
              env:
                # Dedicated PG for the queue — separate secret (`pg-notifications`)
                # because the infra is isolated from the main `pg-app`. Keys
                # follow the same convention as the main app.
                - name: NOTIFICATIONS_POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGHOST
                - name: NOTIFICATIONS_POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGDATABASE
                - name: NOTIFICATIONS_POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGPORT
                - name: NOTIFICATIONS_POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGUSER
                - name: NOTIFICATIONS_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGPASSWORD
                - name: NOTIFICATIONS_POSTGRES_SSLMODE
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
                      key: PGSSLMODE
                # Main DB — only used to append audit rows to `audit.action_log`
                # (the queue lives in the dedicated DB above). Optional: a
                # missing DATABASE_URL just disables audit logging.
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGHOST
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGDATABASE
                - name: POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGPORT
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGUSER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGPASSWORD
                - name: POSTGRES_SSLMODE
                  valueFrom:
                    secretKeyRef:
                      name: "{{ .Values.global.pgSecretName }}"
                      key: PGSSLMODE
                # SMTP relay configuration — shared with the app pod.
                - name: MAIL_ENABLED
                  valueFrom:
                    configMapKeyRef:
                      name: egapro
                      key: MAIL_ENABLED
                      optional: true
                - name: SMTP_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: egapro
                      key: SMTP_HOST
                      optional: true
                - name: SMTP_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: egapro
                      key: SMTP_PORT
                      optional: true
                - name: SMTP_SECURE
                  valueFrom:
                    configMapKeyRef:
                      name: egapro
                      key: SMTP_SECURE
                      optional: true
                - name: MAIL_FROM
                  valueFrom:
                    configMapKeyRef:
                      name: egapro
                      key: MAIL_FROM
                      optional: true
                - name: SMTP_USER
                  valueFrom:
                    secretKeyRef:
                      name: smtp
                      key: SMTP_USER
                      optional: true
                - name: SMTP_PASS
                  valueFrom:
                    secretKeyRef:
                      name: smtp
                      key: SMTP_PASS
                      optional: true
              envFrom:
                # Optional batch-size / max-attempts overrides via configmap.
                - configMapRef:
                    name: "notifications-worker"
                    optional: true
              command:
                - node
                - packages/app/scripts/notifications-worker.mjs
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
