global:
  pgSecretName: pg-app

app:
  ~chart: app
  ~needs:
    - pg
    - valkey
  imagePackage: app
  probesPath: /api/healthz
  containerPort: 3000
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - configMapRef:
        name: "proconnect"
    - secretRef:
        name: "proconnect"
    - secretRef:
        name: "api"
    - configMapRef:
        name: "suit"
    - secretRef:
        name: "suit"
    - secretRef:
        name: "next-auth"
    - configMapRef:
        name: "s3"
    - secretRef:
        name: "s3"
    - configMapRef:
        name: "clamav"
    - configMapRef:
        name: "mail"
    - configMapRef:
        name: "gip-mds"
        optional: true
    - secretRef:
        name: "gip-mds-import"
        optional: true
    - configMapRef:
        name: "admin"
        optional: true
    - secretRef:
        name: "admin"
        optional: true
    - secretRef:
        name: "audit-cleanup"
        optional: true
    - configMapRef:
        name: "valkey"
        optional: true
  env:
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGHOST
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGDATABASE
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPORT
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGUSER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPASSWORD
    - name: POSTGRES_SSLMODE
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGSSLMODE
  vars:
    NEXTAUTH_URL: "https://{{ .Values.global.host }}/api/auth"
    NEXT_PUBLIC_EGAPRO_ENV: "{{ .Values.global.env }}"

pg:
  ~chart: pg

# Valkey (Redis-compatible) cache.
# Deployed via the project-local `valkey` wrapper chart (.kontinuous/charts/valkey)
# which pulls the official valkey-io/valkey-helm chart as a dependency.
# Base defaults live in the wrapper's values.yaml; per-env overrides below.
valkey: {}

clamav:
  ~chart: clamav
