global:
  pgSecretName: pg-app

app:
  ~chart: app
  ~needs:
    - pg
  imagePackage: app
  probesPath: /api/healthz
  containerPort: 3000
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - configMapRef:
        name: "proconnect"
    - secretRef:
        name: "proconnect"
    - secretRef:
        name: "api"
    - configMapRef:
        name: "suit"
    - secretRef:
        name: "suit"
    - secretRef:
        name: "next-auth"
    - configMapRef:
        name: "s3"
    - secretRef:
        name: "s3"
    - configMapRef:
        name: "clamav"
    - configMapRef:
        name: "mail"
    - configMapRef:
        name: "gip-mds"
        optional: true
    - secretRef:
        name: "gip-mds-import"
        optional: true
    - configMapRef:
        name: "admin"
        optional: true
    - secretRef:
        name: "admin"
        optional: true
    - secretRef:
        name: "audit-cleanup"
        optional: true
  env:
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGHOST
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGDATABASE
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPORT
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGUSER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPASSWORD
    - name: POSTGRES_SSLMODE
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGSSLMODE
    # SMTP (Tipimail in preprod/prod). The smtp-app sealed-secret is kept
    # as-is from the V1 prod setup, with MAILER_* keys. We remap to the
    # V2 SMTP_* names expected by src/env.js. `optional: true` lets dev
    # review apps (no smtp-app secret) fall back to the values injected by
    # the mail configmap (pointing at MailDev).
    - name: SMTP_HOST
      valueFrom:
        secretKeyRef:
          name: smtp-app
          key: MAILER_SMTP_HOST
          optional: true
    - name: SMTP_PORT
      valueFrom:
        secretKeyRef:
          name: smtp-app
          key: MAILER_SMTP_PORT
          optional: true
    - name: SMTP_USER
      valueFrom:
        secretKeyRef:
          name: smtp-app
          key: MAILER_SMTP_LOGIN
          optional: true
    - name: SMTP_PASS
      valueFrom:
        secretKeyRef:
          name: smtp-app
          key: MAILER_SMTP_PASSWORD
          optional: true
    - name: SMTP_SECURE
      valueFrom:
        secretKeyRef:
          name: smtp-app
          key: MAILER_SMTP_SSL
          optional: true
  vars:
    NEXTAUTH_URL: "https://{{ .Values.global.host }}/api/auth"
    NEXT_PUBLIC_EGAPRO_ENV: "{{ .Values.global.env }}"

pg:
  ~chart: pg

clamav:
  ~chart: clamav
