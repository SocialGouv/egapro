global:
  pgSecretName: pg-app
  # Notifications worker (packages/notifications). Enabled by default so the
  # mail flow can be exercised on every environment (dev / preprod review apps,
  # preprod, prod). The deployment tolerates a missing pg-notifications secret:
  # every NOTIFICATIONS_POSTGRES_* env var is `optional: true`, and on startup
  # `packages/notifications/src/index.ts` exits cleanly when the queue DB URL
  # is absent — so a namespace without pg-notifications just runs an idle pod.
  notificationsEnabled: true
  # APISIX standalone gateway in front of the SUIT API.
  # Templates: .kontinuous/templates/apisix-suit.yaml + apisix-suit.ingress.yaml.
  # Scoped under `global:` because only `global.*` values are propagated to the
  # `project` subchart where those templates live. Default = 1 replica
  # (dev/preprod review apps). Prod overrides to 2 for HA.
  apisixSuit:
    replicas: 1
    ingressClassName: nginx

app:
  ~chart: app
  ~needs:
    - pg
    - valkey
  imagePackage: app
  probesPath: /api/healthz
  containerPort: 3000
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - configMapRef:
        name: "proconnect"
    - secretRef:
        name: "proconnect"
    - secretRef:
        name: "api"
    - configMapRef:
        name: "suit"
    - secretRef:
        name: "suit"
    - secretRef:
        name: "next-auth"
    - configMapRef:
        name: "s3"
    - secretRef:
        name: "s3"
    - configMapRef:
        name: "clamav"
    - configMapRef:
        name: "mail"
    - configMapRef:
        name: "gip-mds"
        optional: true
    - secretRef:
        name: "gip-mds-import"
        optional: true
    - configMapRef:
        name: "admin"
        optional: true
    - secretRef:
        name: "admin"
        optional: true
    - configMapRef:
        name: "valkey"
        optional: true
    # Matomo Reporting API token for the admin funnel widget (issue #3646).
    # Optional: the admin chart degrades to "no data" when absent. The base
    # URL falls back to NEXT_PUBLIC_MATOMO_URL, so only the token is a secret —
    # ops creates the `matomo` sealed-secret (key MATOMO_API_TOKEN) per env.
    - secretRef:
        name: "matomo"
        optional: true
  env:
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGHOST
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGDATABASE
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPORT
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGUSER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPASSWORD
    - name: POSTGRES_SSLMODE
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGSSLMODE
    # Notifications queue DB (pg-boss). Optional everywhere: when the secret
    # is absent (review apps), env.js leaves NOTIFICATIONS_DATABASE_URL
    # unset and enqueueNotification returns `queue_unavailable` without
    # blocking the calling mutation. Wired explicitly here (same shape as
    # POSTGRES_*) because each key lives in a separate field of the secret.
    - name: NOTIFICATIONS_POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGHOST
          optional: true
    - name: NOTIFICATIONS_POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGDATABASE
          optional: true
    - name: NOTIFICATIONS_POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGPORT
          optional: true
    - name: NOTIFICATIONS_POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGUSER
          optional: true
    - name: NOTIFICATIONS_POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGPASSWORD
          optional: true
    - name: NOTIFICATIONS_POSTGRES_SSLMODE
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.notificationsPgSecretName | default \"pg-notifications\" }}"
          key: PGSSLMODE
          optional: true
    # SMTP_* / MAIL_* are intentionally NOT injected into the app pod —
    # they are consumed exclusively by the notifications worker. See
    # `.kontinuous/templates/notifications-deployment.yaml` for the
    # worker-side wiring (same smtp-app sealed-secret + mail configmap).
  vars:
    NEXTAUTH_URL: "https://{{ .Values.global.host }}/api/auth"
    NEXT_PUBLIC_EGAPRO_ENV: "{{ .Values.global.env }}"

pg:
  ~chart: pg

# Valkey cache. Official valkey-io/valkey-helm chart pulled as a Helm dependency
# from .kontinuous/Chart.yaml. Values below flow straight through to that chart.
valkey:
  # Pin service name so VALKEY_URL (redis://valkey:6379) resolves in every namespace.
  fullnameOverride: valkey
  image:
    tag: "9.0.2"
  service:
    type: ClusterIP
    port: 6379
  # Dev and preprod run a single-pod standalone deployment — cache loss on
  # restart is acceptable, and it keeps infra cost minimal. Prod overrides
  # this to a master/replica topology sized against app.autoscale.
  replica:
    enabled: false
  dataStorage:
    enabled: false
  auth:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

clamav:
  ~chart: clamav
