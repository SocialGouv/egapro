global:
  pgSecretName: pg-app

app:
  ~chart: app
  ~needs:
    - pg
  imagePackage: app
  probesPath: /api/healthz
  containerPort: 3000
  envFrom:
    - secretRef:
        name: "{{ .Values.global.pgSecretName }}"
    - configMapRef:
        name: "proconnect"
    - secretRef:
        name: "proconnect"
    - secretRef:
        name: "api"
    - configMapRef:
        name: "suit"
    - secretRef:
        name: "suit"
    - secretRef:
        name: "next-auth"
    - configMapRef:
        name: "s3"
    - secretRef:
        name: "s3"
    - configMapRef:
        name: "clamav"
    - configMapRef:
        name: "gip-mds"
        optional: true
    - secretRef:
        name: "gip-mds-import"
        optional: true
  env:
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGHOST
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGDATABASE
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPORT
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGUSER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGPASSWORD
    - name: POSTGRES_SSLMODE
      valueFrom:
        secretKeyRef:
          name: "{{ .Values.global.pgSecretName }}"
          key: PGSSLMODE
  vars:
    NEXTAUTH_URL: "https://{{ .Values.global.host }}/api/auth"
    NEXT_PUBLIC_EGAPRO_ENV: "{{ .Values.global.env }}"
    # Campaign deadlines (ISO format YYYY-MM-DD). Override per env if needed.
    EGAPRO_DECL1_MODIFICATION_DEADLINE: "2027-06-01"
    EGAPRO_DECL1_JUSTIFICATION_DEADLINE: "2027-07-01"
    EGAPRO_DECL1_JOINT_EVALUATION_DEADLINE: "2027-08-01"
    EGAPRO_DECL2_MODIFICATION_DEADLINE: "2027-12-01"
    EGAPRO_DECL2_JUSTIFICATION_DEADLINE: "2027-12-01"
    EGAPRO_DECL2_JOINT_EVALUATION_DEADLINE: "2028-02-01"

pg:
  ~chart: pg

clamav:
  ~chart: clamav
