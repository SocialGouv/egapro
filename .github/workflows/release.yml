name: 🔖 Release

# Manual-only releaser for the beta channel. The alpha channel was extracted
# into release-alpha.yaml (also manual): merging to alpha no longer publishes
# a prerelease — and therefore no longer auto-deploys to prod — on its own.
# master is intentionally out of scope here (never in the trigger nor the gate).
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  GIT_AUTHOR_EMAIL: ${{ secrets.SOCIALGROOVYBOT_EMAIL }}
  GIT_AUTHOR_NAME: ${{ secrets.SOCIALGROOVYBOT_NAME }}
  GIT_COMMITTER_EMAIL: ${{ secrets.SOCIALGROOVYBOT_EMAIL }}
  GIT_COMMITTER_NAME: ${{ secrets.SOCIALGROOVYBOT_NAME }}

jobs:
  release:
    if: github.ref == 'refs/heads/beta'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get GitHub App Token
        id: token
        uses: SocialGouv/token-bureau@main
        with:
          token-bureau-url: https://token-bureau.fabrique.social.gouv.fr
          audience: socialgouv

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.SOCIALGROOVYBOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SOCIALGROOVYBOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_push_gpgsign: false
          # Tag signing must stay off: semantic-release >= 20 creates
          # lightweight tags (`git tag <name> <sha>`, no -m), and
          # tag.gpgSign=true turns them into signed tags that require a
          # message — git then aborts in CI with "Terminal is dumb, but
          # EDITOR unset". Release commits (master/beta) remain GPG-signed.
          git_tag_gpgsign: false

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        run: pnpm release
