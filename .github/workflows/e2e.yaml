name: 🧪 E2E Tests

on:
  push:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "Test e2e"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5438/egapro
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000/api/auth
      EGAPRO_PROCONNECT_CLIENT_ID: ${{ secrets.EGAPRO_PROCONNECT_CLIENT_ID }}
      EGAPRO_PROCONNECT_CLIENT_SECRET: ${{ secrets.EGAPRO_PROCONNECT_CLIENT_SECRET }}
      EGAPRO_PROCONNECT_ISSUER: ${{ secrets.EGAPRO_PROCONNECT_ISSUER }}
      EGAPRO_WEEZ_API_URL: ${{ secrets.EGAPRO_WEEZ_API_URL }}
      EGAPRO_SUIT_API_URL: ${{ secrets.EGAPRO_SUIT_API_URL }}
      # Deterministic dev value matching the E2E test's hardcoded secret.
      # The real secret is only needed in deployed environments (where the
      # APISIX gateway injects it into the X-Gateway-Forwarded header).
      EGAPRO_GATEWAY_SHARED_SECRET: dev-gateway-shared-secret-minimum-32-chars
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: egapro-dev-app
      CLAMAV_HOST: localhost
      CLAMAV_PORT: 3310
      ADMIN_EMAILS: test@fia1.fr
      # Notifications worker + publisher wiring (separate Postgres + MailDev
      # SMTP). The dev server reads NOTIFICATIONS_DATABASE_URL when calling
      # `enqueueNotification`; the worker is spawned by the E2E test itself
      # and inherits these from process.env.
      NOTIFICATIONS_DATABASE_URL: postgresql://postgres:postgres@localhost:5439/egapro_notifications
      MAIL_ENABLED: "true"
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      MAIL_FROM: no-reply@egapro.local
      MAILDEV_URL: http://localhost:1080
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Start services
        run: docker compose up -d
      - uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Restore CI build cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: ./*
          key: "${{ github.sha }}"
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm build
      - name: Apply database schema
        run: pnpm db:push
      - name: Diagnostic — runner state before Playwright install
        run: |
          echo "=== disk usage ===" && df -h /
          echo "=== memory ===" && free -h
          echo "=== /tmp size ===" && du -sh /tmp 2>/dev/null || true
          echo "=== ~/.cache size ===" && du -sh ~/.cache 2>/dev/null || true
          echo "=== ms-playwright dir ===" && ls -la ~/.cache/ms-playwright 2>/dev/null || echo "(absent)"
          echo "=== load ===" && cat /proc/loadavg
          echo "=== runner ===" && cat /etc/os-release | grep -E '^(NAME|VERSION)='
      - name: Install Playwright browsers
        run: pnpm --filter app exec playwright install --no-shell chromium
        timeout-minutes: 8
        env:
          DEBUG: pw:install
      - name: Install Playwright system dependencies
        run: pnpm --filter app exec playwright install-deps chromium
        timeout-minutes: 5
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
      - name: Run E2E tests
        run: pnpm test:e2e
      - name: Stop services
        if: always()
        run: docker compose down
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
