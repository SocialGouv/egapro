name: 🧪 E2E Tests

on:
  deployment_status:

concurrency:
  group: e2e-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "Test e2e"
    if: >
      github.event.deployment_status.state == 'success' &&
      !startsWith(github.event.deployment.environment, 'build-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm playwright:install
      - name: Load SocialGouv variables
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1
      - name: Write kubeconfig
        run: |
          printenv KUBECONFIG_DATA > /tmp/kubeconfig
          # If the secret is base64-encoded, decode it
          if ! kubectl --kubeconfig=/tmp/kubeconfig config view &>/dev/null; then
            printenv KUBECONFIG_DATA | base64 -d > /tmp/kubeconfig
          fi
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
      - name: Setup DB access via port-forward
        id: db
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          NAMESPACE="${{ steps.env.outputs.subdomain }}"
          if [ -z "$NAMESPACE" ]; then
            echo "Namespace not found, skipping DB cleanup"
            exit 0
          fi

          # Extract server URL and token from kubeconfig (--raw to avoid redaction)
          SERVER=$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')
          TOKEN=$(kubectl config view --minify --raw -o jsonpath='{.users[0].user.token}')

          # Fetch secret via direct REST call (bypasses kubectl API discovery issues with Rancher)
          SECRET_JSON=$(curl -sk -H "Authorization: Bearer $TOKEN" "$SERVER/api/v1/namespaces/$NAMESPACE/secrets/pg-app")
          PGUSER=$(echo "$SECRET_JSON" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['data']['PGUSER']).decode())")
          PGPASSWORD=$(echo "$SECRET_JSON" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['data']['PGPASSWORD']).decode())")
          PGDATABASE=$(echo "$SECRET_JSON" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['data']['PGDATABASE']).decode())")
          if [ -z "$PGUSER" ]; then
            echo "DB credentials not found in secret, skipping DB cleanup"
            exit 0
          fi

          # Port-forward pg service to localhost (pg-rw is internal K8s DNS)
          kubectl port-forward -n "$NAMESPACE" svc/pg-rw 5432:5432 &
          PF_PID=$!
          echo "PF_PID=${PF_PID}" >> "$GITHUB_OUTPUT"
          sleep 3

          # Verify port-forward is running
          if ! kill -0 "$PF_PID" 2>/dev/null; then
            echo "Port-forward failed to start, skipping DB cleanup"
            exit 0
          fi

          DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@localhost:5432/${PGDATABASE}?sslmode=disable"
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          SITE_URL: https://${{ steps.env.outputs.subdomain }}.ovh.fabrique.social.gouv.fr
          DATABASE_URL: ${{ steps.db.outputs.DATABASE_URL }}
      - name: Stop port-forward
        if: always() && steps.db.outputs.PF_PID
        run: kill ${{ steps.db.outputs.PF_PID }} 2>/dev/null || true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
