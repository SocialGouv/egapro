name: 🧪 E2E Tests

on:
  deployment_status:

concurrency:
  group: e2e-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "Test e2e"
    if: >
      github.event.deployment_status.state == 'success' &&
      !startsWith(github.event.deployment.environment, 'build-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm playwright:install
      - name: Load SocialGouv variables
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1
      - name: Extract DATABASE_URL from Kubernetes
        id: db
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          NAMESPACE="${{ steps.env.outputs.subdomain }}"
          if [ -z "$NAMESPACE" ]; then
            echo "Namespace not found, skipping DB cleanup"
            exit 0
          fi
          DATABASE_URL=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not found in secret, skipping DB cleanup"
            exit 0
          fi
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          SITE_URL: https://${{ steps.env.outputs.subdomain }}.ovh.fabrique.social.gouv.fr
          DATABASE_URL: ${{ steps.db.outputs.DATABASE_URL }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
