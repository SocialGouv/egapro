name: 🧪 E2E Tests

on:
  deployment_status:

concurrency:
  group: e2e-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "Test e2e"
    if: >
      github.event.deployment_status.state == 'success' &&
      !startsWith(github.event.deployment.environment, 'build-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm playwright:install
      - name: Load SocialGouv variables
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1
      - name: Extract DATABASE_URL from Kubernetes
        id: db
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          BRANCH_SLUG="${{ steps.env.outputs.branchSlug32 }}"
          if [ -z "$BRANCH_SLUG" ]; then
            echo "Branch slug not found, skipping DB cleanup"
            exit 0
          fi
          NAMESPACE=$(kubectl get secret pg-app --all-namespaces --no-headers 2>/dev/null | grep "$BRANCH_SLUG" | awk '{print $1}' | head -1)
          if [ -z "$NAMESPACE" ]; then
            echo "Namespace not found for branch slug $BRANCH_SLUG, skipping DB cleanup"
            exit 0
          fi
          echo "Found namespace: $NAMESPACE"
          PGHOST=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGHOST}' | base64 -d)
          PGPORT=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGPORT}' | base64 -d)
          PGUSER=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGUSER}' | base64 -d)
          PGPASSWORD=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGPASSWORD}' | base64 -d)
          PGDATABASE=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGDATABASE}' | base64 -d)
          PGSSLMODE=$(kubectl get secret pg-app -n "$NAMESPACE" -o jsonpath='{.data.PGSSLMODE}' | base64 -d)
          DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE}"
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          SITE_URL: https://${{ steps.env.outputs.subdomain }}.ovh.fabrique.social.gouv.fr
          DATABASE_URL: ${{ steps.db.outputs.DATABASE_URL }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
